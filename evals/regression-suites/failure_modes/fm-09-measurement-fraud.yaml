  still name) is now a thin backward-compatible SHIM over that real engine
  (see its own module docstring for the shim-vs-new-module decision and
  rationale) rather than a second, divergent scalar reimplementation — its
  public API (`evaluate_b_layer_success` et al.) is unchanged and every
  existing importer (`tests/security/test_f9_measurement_fraud.py`) stays
  green. The scenario is now ALSO proven end-to-end against the real,
  integrated engine over real Postgres-backed ports at
  `tests/integration/measurement_failure/test_f9_fraud_repoint.py::
  test_fraud_signal_through_real_did_and_b_gate_never_passes` — the
  production-path proof this mode's "forward-looking...to be superseded"
  note anticipated.
