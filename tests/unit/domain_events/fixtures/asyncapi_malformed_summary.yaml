asyncapi: 3.0.0
info:
  title: SAENA events (w2-02 unit-test malformed fixture)
  version: "1.0.0"
  description: >-
    Test-only fixture -- operations.*.summary does NOT follow the
    "<producer> produces <event_type>." convention
    saena_domain.events._topics relies on. Exercises TopicCatalogError.
defaultContentType: application/json
channels:
  patch.unit.completed.v1:
    address: patch.unit.completed.v1
    messages:
      patchUnitCompleted:
        name: PatchUnitCompleted
        title: patch.unit.completed.v1
        summary: Patch unit completed (agent-runner-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            type: object

operations:
  sendPatchUnitCompleted:
    action: send
    channel:
      $ref: "#/channels/patch.unit.completed.v1"
    summary: this summary does not match the expected convention at all
    messages:
      - $ref: "#/channels/patch.unit.completed.v1/messages/patchUnitCompleted"
