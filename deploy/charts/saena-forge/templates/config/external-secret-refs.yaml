{{- /*
external-secrets-operator ExternalSecret objects — REFERENCES only. The real
external-secrets.io CRD's `spec.secretStoreRef.kind` accepts exactly two
values: `SecretStore` (namespaced) or `ClusterSecretStore` (cluster-scoped)
— a backend/provider such as Vault is configured INSIDE one of those two
store objects (that store's own `spec.provider.vault: {...}` etc.), never as
a `kind` value on the ExternalSecret itself. `.valueFrom` (this chart's
values-file field name, validated against that 2-value closed enum by
values.schema.json) maps directly to `secretStoreRef.kind`; `.source` (or
its default) maps to `secretStoreRef.name` — the actual SecretStore/
ClusterSecretStore object name, provisioned and pointed at whatever backend
(Vault, AWS Secrets Manager, ...) out-of-band, out of this chart's scope.
k3s spec §8.1 condition 3's fail case (a secret reference resolving to a
plaintext ConfigMap value) is what the `valueFrom` closed enum rejects at
the values-file level. This chart does not, and must not, carry any actual
credential material — `helm template`/`helm lint` render only the
ExternalSecret *request* object; the operator (already running in-cluster,
out of this chart's scope) resolves it against the named store at apply
time.
*/ -}}
{{- range .Values.externalSecrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .source | default "external-secrets-operator" }}
    kind: {{ .valueFrom }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .name }}
---
{{- end }}
