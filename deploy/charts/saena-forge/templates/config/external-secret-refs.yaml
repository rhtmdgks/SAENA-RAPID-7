{{- /*
external-secrets-operator ExternalSecret objects — REFERENCES only (backend
SecretStore/ClusterSecretStore/VaultSecret; k3s spec §8.1 condition 3 fail
case is a reference resolving to a plaintext ConfigMap value, which
values.schema.json already rejects at the values-file level via the
`externalSecrets[].valueFrom` closed enum). This chart does not, and must
not, carry any actual credential material — `helm template`/`helm lint`
render only the ExternalSecret *request* object; the operator (already
running in-cluster, out of this chart's scope) resolves it against the
named backend at apply time.
*/ -}}
{{- range .Values.externalSecrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .source | default "external-secrets-operator" }}
    kind: {{ .valueFrom }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .name }}
---
{{- end }}
