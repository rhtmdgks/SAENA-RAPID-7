{{- /*
Least-privilege ServiceAccount per service — no default SA API access
(security-model.md constraint: "Least privilege RBAC; default SA has no API
power"). automountServiceAccountToken is explicit per service (default true
here only because each service DOES need to talk to its own scoped Role,
e.g. agent-orchestrator's batch/jobs grant — services with no in-cluster API
need can override to false via `services.<key>.serviceAccount.automountServiceAccountToken: false`).
*/ -}}
{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $sa := $svc.serviceAccount | default dict }}
{{- $create := $sa.create }}
{{- if not (hasKey $sa "create") }}{{- $create = true }}{{- end }}
{{- if $create }}
{{- $automount := $sa.automountServiceAccountToken }}
{{- if not (hasKey $sa "automountServiceAccountToken") }}{{- $automount = $.Values.serviceDefaults.serviceAccount.automountServiceAccountToken }}{{- end }}
{{- $saName := include "saena-forge.serviceAccountName" (dict "root" $ "service" $svc.nameSuffix) }}
{{- $labels := include "saena-forge.serviceLabels" (dict "root" $ "service" $svc.nameSuffix) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $svc.namespace }}
  labels:
    {{- $labels | nindent 4 }}
automountServiceAccountToken: {{ $automount }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agentRunner.job.serviceAccount }}
  namespace: {{ .Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" . | nindent 4 }}
    saena.io/pool: runner
automountServiceAccountToken: true
