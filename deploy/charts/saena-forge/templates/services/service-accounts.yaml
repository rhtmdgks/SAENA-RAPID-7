{{- /*
Least-privilege ServiceAccount per service — no default SA API access
(security-model.md constraint: "Least privilege RBAC; default SA has no API
power"). automountServiceAccountToken is explicit per service (default true
here only because each service DOES need to talk to its own scoped Role,
e.g. agent-orchestrator's batch/jobs grant — services with no in-cluster API
need can override to false via `services.<key>.serviceAccount.automountServiceAccountToken: false`).

Below the 8 service SAs: the ADR-0004 §3 SA 3-separation set — agent-runner,
quality-eval, repository-intake (runner-pool-extended: "customer source를
다루는 모든 Job") and the browser-pool chatgpt-observer/site-discovery SAs.
Every one of these five sets `automountServiceAccountToken: false` at the SA
level (unlike the 8 service SAs above, which talk to the API directly from
their long-running Deployment pod) — the untrusted-Job pods that actually
consume these SAs render in a separate patch unit
(templates/rbac/agent-runner-role.yaml header comment) and are responsible
for opting a specific Job's pod spec INTO `automountServiceAccountToken:
true` only when its Role (templates/rbac/agent-runner-role.yaml /
templates/rbac/execution-jobs-roles.yaml) actually grants something.
*/ -}}
{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $sa := $svc.serviceAccount | default dict }}
{{- $create := $sa.create }}
{{- if not (hasKey $sa "create") }}{{- $create = true }}{{- end }}
{{- if $create }}
{{- $automount := $sa.automountServiceAccountToken }}
{{- if not (hasKey $sa "automountServiceAccountToken") }}{{- $automount = $.Values.serviceDefaults.serviceAccount.automountServiceAccountToken }}{{- end }}
{{- $saName := include "saena-forge.serviceAccountName" (dict "root" $ "service" $svc.nameSuffix) }}
{{- $labels := include "saena-forge.serviceLabels" (dict "root" $ "service" $svc.nameSuffix) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $svc.namespace }}
  labels:
    {{- $labels | nindent 4 }}
automountServiceAccountToken: {{ $automount }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agentRunner.job.serviceAccount }}
  namespace: {{ .Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" . | nindent 4 }}
    saena.io/pool: runner
automountServiceAccountToken: false
{{- if .Values.executionJobs }}
{{- with .Values.executionJobs.qualityEval }}
{{- if .enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .serviceAccount }}
  namespace: {{ $.Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" $ | nindent 4 }}
    saena.io/pool: {{ .pool }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- with .Values.executionJobs.repositoryIntake }}
{{- if .enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .serviceAccount }}
  namespace: {{ $.Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" $ | nindent 4 }}
    saena.io/pool: {{ .pool }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- with .Values.executionJobs.browserPool.chatgptObserver }}
{{- if .enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .serviceAccount }}
  namespace: {{ $.Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" $ | nindent 4 }}
    saena.io/pool: {{ .pool }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- with .Values.executionJobs.browserPool.siteDiscovery }}
{{- if .enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .serviceAccount }}
  namespace: {{ $.Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" $ | nindent 4 }}
    saena.io/pool: {{ .pool }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- end }}
