{{- /*
k3s spec §1: Namespace | saena-system, saena-data, saena-observability, saena-tenant-<id>
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.system }}
  labels:
    {{- include "saena-forge.labels" . | nindent 4 }}
    saena.io/namespace-role: system
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.data }}
  labels:
    {{- include "saena-forge.labels" . | nindent 4 }}
    saena.io/namespace-role: data
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.observability }}
  labels:
    {{- include "saena-forge.labels" . | nindent 4 }}
    saena.io/namespace-role: observability
