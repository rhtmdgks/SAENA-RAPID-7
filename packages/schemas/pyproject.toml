[project]
name = "saena-schemas"
version = "0.1.0"
description = "SAENA typed contract models — codegen-only, derived from packages/contracts (ADR-0011 SSOT split)"
requires-python = ">=3.12,<3.13"
dependencies = ["pydantic>=2,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["saena_schemas"]
