openapi: 3.1.0
jsonSchemaDialect: "https://json-schema.org/draft/2020-12/schema"
info:
  title: SAENA contract-validation composition document
  version: "1.0.0"
  description: >-
    composition-validation document — NOT a service API. This document exists
    solely so an OpenAPI 3.1 tool (openapi-spec-validator, and later w1-11/13
    tooling) can validate the 15 P0 JSON Schema contracts as a single
    components.schemas composition proof (13 catalog contract files — the
    RunContext catalog row splits into run-context-lifecycle + run-context-experiment,
    ruling R10 — plus common/envelope EventEnvelope and common/problem-detail
    ProblemDetail). No `paths` key is declared: OpenAPI 3.1 permits an
    operationless, components-only document (verified by local smoke test,
    see w1-08 commit verification matrix — `paths` omitted entirely, not
    `paths: {}`). Do not add service endpoints here — see CLAUDE.md protected
    paths and approved plan §2 "API 문서" row ("경로 0 — 서비스 endpoint 금지 준수").
components:
  schemas:
    TenantContext:
      $ref: "../../../json-schema/context/tenant-context/v1/tenant-context.schema.json"
    ActorContext:
