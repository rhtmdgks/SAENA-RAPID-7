asyncapi: 3.0.0
info:
  title: SAENA events (v1)
  version: "1.0.0"
  description: >-
    CONFIRMED v1 event catalog — 12 channels (docs/architecture/api-event-contracts.md
    §"Recommended topics", quality.gate split into passed/failed channels per
    ADR-0013/domain-verification-result R4) **+ 4 Wave 4 NEW channels** (w4-10
    Contracts Steward — docs/architecture/wave4-plan.md "Existing vs new
    events": demand.graph.versioned.v1/observation.captured.v1/
    citation.normalized.v1 were already CONFIRMED-v1 channels and only gain
    their payload $ref here for the first time (no channel-count change);
    entity.graph.versioned.v1/claim.evidence.versioned.v1/
    experiment.registered.v1/experiment.anchored.v1 are the 4 brand-new
    channels — 16 channels total as of Wave 4). **+ 1 Wave 5 NEW channel**
    (w5-02 Contracts Steward — deployment.confirmed.v1, channel #17, the sole
    7-day-clock start authority; wave5-plan.md deliverable 2) AND the two
    previously envelope-only P1-deferred channels experiment.outcome.observed.v1
    and strategy.card.eligible.v1 gained their payload $ref for the first time
    in Wave 5 (no channel-count change from those two) — 17 channels total as of
    Wave 5. Delivery semantics: at-least-once
    with idempotent consumers (docs/specs/SAENA_k3s_Package_and_Operations_Spec_v1.md
    §4.1; docs/architecture/api-event-contracts.md "Events: versioned topics;
    at-least-once; idempotent consumers"). No dead-letter-queue channel is
    declared in this document — DLQ routing is an operational/infra concern
    (k3s package, W2C) out of scope for the contract-level catalog. Every
    channel's message payload is an allOf overlay over
    envelope/event-envelope/v1 (R8, approved plan §1.1 ruling R8 — AsyncAPI
    allOf-overlay pattern) that pins event_type/context_type via const and
    substitutes payload with the event's own payload schema. As of Wave 5
    (w5-02) every channel — including experiment.outcome.observed.v1 and
    strategy.card.eligible.v1, which were the last two envelope-only
    deferred channels in Wave 4 — now pins a concrete payload $ref; no
    envelope-only-default channels remain.
    Every message's payload is a Multi Format Schema Object
    (AsyncAPI 3.0.0 spec §Message Object payload field references the Multi
    Format Schema Object, NOT a bare schemaFormat sibling key on the Message
    Object itself — REWORK fixed, critic M2) — payload.schemaFormat +
    payload.schema, schemaFormat value unchanged
    (application/schema+json;version=draft-2020-12).
defaultContentType: application/json
channels:
  repo.intaken.v1:
    address: repo.intaken.v1
    description: Repository/source intake snapshot captured.
    messages:
      repoIntaken:
        name: RepoIntaken
        title: repo.intaken.v1
        summary: Repository intake snapshot captured (repository-intake-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
              - $ref: "../../../json-schema/envelope/event-envelope/v1/event-envelope.schema.json"
              - properties:
                  event_type:
                    const: repo.intaken.v1
                  context_type:
                    const: tenant
                  payload:
                    $ref: "../../../json-schema/event/repo-intaken/v1/repo-intaken.schema.json"

  site.inventory.completed.v1:
    address: site.inventory.completed.v1
    description: Site/domain inventory pass completed.
    messages:
