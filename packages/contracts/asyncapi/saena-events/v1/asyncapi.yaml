              - properties:
                  event_type:
                    const: quality.gate.failed.v1
                  context_type:
                    const: tenant
                  payload:
                    allOf:
                      - $ref: "../../../json-schema/event/quality-gate-result/v1/quality-gate-result.schema.json"
                      - required: ["failures"]

  experiment.outcome.observed.v1:
    address: experiment.outcome.observed.v1
    description: >-
      DiD experiment outcome observed over the 7-day window + B-layer verdict
      (w5-02: payload contract landed, Wave 5). skill-bank consumes B-verified
      (b_verdict=pass) outcomes ONLY (api-event-contracts.md:68; wave5-plan.md
      E7). engine-id-required (experiment 계열, ADR-0013).
    x-saena-engine-id-required: true
    messages:
      experimentOutcomeObserved:
        name: ExperimentOutcomeObserved
        title: experiment.outcome.observed.v1
        summary: Experiment outcome observed (experiment-attribution-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
              - $ref: "../../../json-schema/envelope/event-envelope/v1/event-envelope.schema.json"
              - properties:
                  event_type:
                    const: experiment.outcome.observed.v1
                  context_type:
                    const: tenant
                  payload:
                    $ref: "../../../json-schema/event/experiment-outcome-observed/v1/experiment-outcome-observed.schema.json"

  strategy.card.eligible.v1:
    address: strategy.card.eligible.v1
    description: >-
      Strategy-card candidate eligible for the (aggregate) skill bank, backed
      by a B-verified outcome (w5-02: payload contract landed, Wave 5).
      AggregateContext (cross-tenant, k-anonymity fields on the envelope —
      ADR-0006 rev.2 / ADR-0013). Fail-closed intake boundary ONLY
      (wave5-plan.md non-scope: no auto-approval / global sharing).
    messages:
      strategyCardEligible:
        name: StrategyCardEligible
        title: strategy.card.eligible.v1
        summary: Strategy card eligible (strategy-skill-bank-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
              - $ref: "../../../json-schema/envelope/event-envelope/v1/event-envelope.schema.json"
              - properties:
                  event_type:
                    const: strategy.card.eligible.v1
                  context_type:
                    const: aggregate
                  payload:
                    $ref: "../../../json-schema/event/strategy-card-eligible/v1/strategy-card-eligible.schema.json"

  deployment.confirmed.v1:
    address: deployment.confirmed.v1
    description: >-
      Customer/B-department deployment of an experiment's treatment confirmed
      (Wave 5 NEW channel #17, w5-02 Contracts Steward — wave5-plan.md
      deliverable 2). SOLE authority that starts the 7-day external-performance
      clock (ALG §7.3:483). NOT an engine observation — deployment confirmation
      is a customer/CI-CD signal, not a ChatGPT-Search observation, so this
      channel is intentionally NOT x-saena-engine-id-required. The payload's
      confirmed_at is a customer CLAIM only; the clock's trust anchor is the
      server receive time at the ingress, never the payload timestamp
      (H5 confirmer trust model). Producer forge-console-api-service — the
      external signal is ingested and republished by the forge-console-api
      ingress gateway.
    messages:
      deploymentConfirmed:
        name: DeploymentConfirmed
        title: deployment.confirmed.v1
        summary: Deployment confirmed (forge-console-api-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
              - $ref: "../../../json-schema/envelope/event-envelope/v1/event-envelope.schema.json"
              - properties:
                  event_type:
                    const: deployment.confirmed.v1
                  context_type:
                    const: tenant
                  payload:
                    $ref: "../../../json-schema/event/deployment-confirmed/v1/deployment-confirmed.schema.json"

