  quality.gate.passed.v1:
    address: quality.gate.passed.v1
    description: >-
      Quality gate passed (R4 channel-layer enforcement: failures key MUST
      be absent — approved plan §1.1 ruling R4/R8).
    messages:
      qualityGatePassed:
        name: QualityGatePassed
        title: quality.gate.passed.v1
        summary: Quality gate passed (quality-eval-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
              - $ref: "../../../json-schema/envelope/event-envelope/v1/event-envelope.schema.json"
              - properties:
                  event_type:
                    const: quality.gate.passed.v1
                  context_type:
                    const: tenant
                  payload:
                    allOf:
                      - $ref: "../../../json-schema/event/quality-gate-result/v1/quality-gate-result.schema.json"
                      - not:
                          required: ["failures"]

  quality.gate.failed.v1:
    address: quality.gate.failed.v1
    description: >-
      Quality gate failed (R4 channel-layer enforcement: failures key MUST
      be present, >=1 item — approved plan §1.1 ruling R4/R8).
    messages:
      qualityGateFailed:
        name: QualityGateFailed
        title: quality.gate.failed.v1
        summary: Quality gate failed (quality-eval-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
