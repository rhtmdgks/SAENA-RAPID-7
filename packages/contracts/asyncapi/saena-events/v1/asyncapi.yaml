        name: EntityGraphVersioned
        title: entity.graph.versioned.v1
        summary: Entity graph version published (entity-resolution-service).
        contentType: application/json
        payload:
          schemaFormat: "application/schema+json;version=draft-2020-12"
          schema:
            allOf:
              - $ref: "../../../json-schema/envelope/event-envelope/v1/event-envelope.schema.json"
              - properties:
                  event_type:
                    const: entity.graph.versioned.v1
