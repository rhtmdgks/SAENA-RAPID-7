[project]
name = "saena-domain"
version = "0.1.0"
description = "SAENA runtime domain library — identity, events, privacy, audit, policy, persistence ports (Wave 2)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.9,<3",
    "jsonschema>=4.23,<5",
    "referencing>=0.35,<1",
    "sqlalchemy>=2.0.36,<3",
    "asyncpg>=0.30,<1",
    "aiokafka>=0.12,<1",
    "greenlet>=3,<4",
    "pyyaml>=6,<7",
    "saena-schemas",
    "saena-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saena_domain"]

[tool.uv.sources]
saena-schemas = { workspace = true }
saena-shared = { workspace = true }
