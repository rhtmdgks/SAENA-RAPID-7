[project]
name = "saena-shared"
version = "0.1.0"
description = "SAENA cross-service shared utilities (contract-neutral; no domain logic)"
requires-python = ">=3.12,<3.13"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saena_shared"]
