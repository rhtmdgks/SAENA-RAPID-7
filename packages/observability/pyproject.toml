[project]
name = "saena-observability"
version = "0.1.0"
description = "SAENA observability runtime — tenant-safe structured logging, trace propagation, redaction (ADR-0016)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "opentelemetry-api>=1.29,<2",
    "opentelemetry-sdk>=1.29,<2",
    "pyyaml>=6,<7",
    "saena-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saena_observability"]

[tool.uv.sources]
saena-shared = { workspace = true }
