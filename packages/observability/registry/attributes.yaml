# SAENA telemetry attribute registry (v1) — source of truth (ADR-0016).
#
# Human-edited SSOT. Validate against attributes.schema.json (JSON Schema
# 2020-12, $id: https://schemas.the-saena.ai/common/observability-attribute-registry/v1/attributes.schema.json).
#
# MACHINE-READ MIRROR NOTE: PyYAML is not part of the current dependency
# surface reachable from packages/observability (no local pyproject.toml —
# this package is intentionally not a uv workspace member, ADR-0016 scope).
# attributes.json in this same directory is a generated mirror of this file,
# kept in sync MANUALLY until W1 introduces registry codegen/lint automation
# (see ADR-0016 "Open decisions" — CI lint stage placement, ADR-0018 gate
# matrix, T17). Tests under packages/observability/tests validate the JSON
# mirror with stdlib + jsonschema only. If you edit this file, update
# attributes.json to match in the same patch unit.
#
# Context columns follow the 3-context discriminator (ADR-0006 rev.2 /
# ADR-0013 context_type: tenant | system | aggregate). Values:
#   required  — attribute MUST be present in this context
#   optional  — attribute MAY be present in this context
#   forbidden — attribute MUST NOT be present in this context (exporter/
#               redaction-rules level enforcement target, ADR-0016)

- name: saena.tenant_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: required
    system: forbidden
    aggregate: forbidden
  description: >
    Tenant identifier attribute, mirrors envelope tenant_id (ADR-0013).
    pii=false (not a name/email/etc.) but IS a re-identifying / identifying
    value under the 3-context model — ADR-0006 rev.2 requires its removal
    (not mere optionality) from AggregateContext to prevent re-identification,
    and it is exempted (forbidden) from SystemContext per ADR-0013. Treat as
    identifying for redaction/export-policy purposes even though the pii flag
    on this entry is false.

- name: saena.run_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: required
    system: forbidden
    aggregate: forbidden
  description: >
    Run identifier attribute, mirrors envelope run_id (ADR-0013). Marked
    required for TenantContext because W0 registry scope covers run-scoped
    telemetry; ADR-0013 leaves the nullable allowance for non-run
    TenantContext events OPEN (user decision pending, see ADR-0013 "Open
    decisions") — this registry entry does not resolve that OPEN item and
    must be revisited once ADR-0013 is amended or a follow-up ADR lands.
    Forbidden in SystemContext (property-level exemption) and AggregateContext
    (property-level removal, re-identification prevention), per ADR-0013's
    context_type table.

- name: saena.engine_id
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Search engine identifier, closed vocabulary aligned to envelope payload
    engine_id (ADR-0013): v1 closed enum ["chatgpt-search"] only — CLAUDE.md
    Engine scope v1 (Google AI Overviews/AI Mode/Gemini disabled for
    optimize/observe/claim). Optional at the general attribute level in all
    three contexts, but REQUIRED for the observation/citation/experiment
    event families specifically (ADR-0013 payload requirement) — that
    per-family requirement is stricter than this general per-context default
    and must be enforced at the event/payload contract level (packages/contracts,
    W1), not solely via this registry entry.

- name: saena.context
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: required
    system: required
    aggregate: required
  description: >
    Attribute-level mirror of the envelope context_type discriminator
    (ADR-0013 enum: tenant|system|aggregate). Same vocabulary as
    context_type — no separate vocabulary is created (ADR-0016 constraint).
    Low cardinality (3 values) — safe for span/metric naming inputs if ever
    needed, though ADR-0016 keeps identifiers out of names regardless.
    Required in all three contexts: every span/log/metric must declare which
    context it was emitted under.

- name: saena.patch_unit_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    Identifies the implementation patch unit (worktree/unit-of-work) that
    produced the telemetry, e.g. "w1-04-quality-adrs" (see ADR-0013 example
    instance, patch.unit.completed.v1 payload). Operationally useful in
    TenantContext (workflow lead-time dashboards, observability.md dashboard
    themes) and SystemContext (adapter/config change attribution). Forbidden
    in AggregateContext: a patch unit ID is a high-cardinality, potentially
    re-identifying operational detail with no legitimate role in de-identified
    aggregate telemetry.

- name: saena.contract_hash
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Hash of the applicable contract/schema version in force at emission time
    (contracts SSOT per ADR-0011, packages/contracts). Useful for correlating
    telemetry with a specific contract revision across all three contexts;
    not identifying to a natural person or tenant lineage, so optional
    (not forbidden) in AggregateContext.

- name: saena.policy_bundle_hash
  type: string
  cardinality: medium
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Hash of the policy bundle in force, mirrors the run trace envelope field
    policy_bundle_hash (observability.md CONFIRMED fields, k3s §9.1). Optional
    in TenantContext (and, by consistency with the low re-identification risk
    of a policy bundle version marker, optional rather than forbidden in
    System/AggregateContext) — a bundle hash identifies a policy version, not
    a tenant or individual.

- name: saena.aggregate_scope_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: forbidden
    system: forbidden
    aggregate: required
  description: >
    Mirrors the envelope AggregateContext required field aggregate_scope_id
    (ADR-0013) — identifies the de-identified cohort/aggregate scope, never
    an individual tenant or run. Required only in AggregateContext; forbidden
    in TenantContext and SystemContext since it has no meaning outside an
    aggregate/de-identified scope and its presence there would signal
    aggregate-context leakage into non-aggregate telemetry.

# ---------------------------------------------------------------------------
# Wave 4 (Intelligence, w4-15) additions below. Every new entry follows the
# same discipline as the W0 set above: identifiers/hashes/closed-vocabulary
# enums/booleans only — NEVER a raw query, URL, evidence excerpt, or any
# other customer-source-bearing value. See
# docs/architecture/wave4-plan.md and CLAUDE.md "Engine scope (v1)" /
# W4 constraints ("no PII/secret/customer-source in any telemetry field").
# ---------------------------------------------------------------------------

- name: saena.demand_graph_version
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Content-addressed `sha256:<64-hex>` version hash of a built demand graph
    (mirrors services/intelligence/demand-graph-service `DemandGraph.graph_version`
    / the `demand.graph.versioned.v1` event payload field of
    the same name, w4-02/w4-10). A hash, never the graph's own paraphrase
    text/provenance content — safe to carry across all three contexts as an
    opaque version marker, matching saena.contract_hash's optional-everywhere
    precedent.

- name: saena.entity_graph_version
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Content-addressed `sha256:<64-hex>` version hash of a resolved entity
    graph (mirrors services/intelligence/entity-resolution-service
    `EntityResolutionResult.graph_version` / the `entity.graph.versioned.v1`
    event payload field, w4-03/w4-10). Same opaque-hash discipline as
    saena.demand_graph_version — never the resolved entity names/aliases
    themselves.

- name: saena.claim_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    Identifier of one extracted claim in the claim-evidence ledger (mirrors
    services/intelligence/claim-evidence-service `ExtractedClaim.claim_id` /
    `ClaimPublishability.claim_id`, w4-04). An opaque id, never the claim's
    own `claim_text` (which must never appear in telemetry at all — see
    redaction-rules.yaml). Forbidden in AggregateContext: a claim id is a
    high-cardinality, potentially re-identifying operational detail, same
    rationale as saena.patch_unit_id.

- name: saena.evidence_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    Identifier of one evidence record linked to a claim (mirrors
    services/intelligence/claim-evidence-service `EvidenceRecord.evidence_id`,
    w4-04). An opaque id, never the evidence's own
    `source_uri`/`excerpt` (customer-source-bearing fields that must never
    appear in telemetry — see redaction-rules.yaml). Forbidden in
    AggregateContext, same rationale as saena.claim_id.

- name: saena.claim_publishable
  type: boolean
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    The boolean outcome of `evaluate_claim_publishability` (w4-04) — whether
    a claim currently has at least one present/fresh/unblocked evidence
    link. Two-valued (low cardinality), carries no claim/evidence content
    itself, so it is safe in all three contexts including de-identified
    aggregate rollups (e.g. "% of claims publishable" dashboards) — contrast
    saena.claim_id/saena.evidence_id, which stay forbidden in aggregate.

- name: saena.citation_normalized_uri_hash
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    `sha256:<64-hex>` digest of a citation's normalized URI (mirrors
    services/intelligence/citation-intelligence-service `normalize_url`
    output, w4-05) — a hash of the normalized URI, NEVER the URI string
    itself (a raw/normalized URL is customer-source-adjacent,
    high-cardinality, and potentially re-identifying; this entry exists so
    citation-normalization telemetry can correlate/count without ever
    carrying the URL). Forbidden in AggregateContext, same rationale as
    saena.claim_id.

- name: saena.browser_pool_state
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Closed-vocabulary lifecycle state of one chatgpt-observer browser-pool
    session (mirrors services/acquisition/chatgpt-observer-service `BrowserPool`
    acquire/release/recycle/close lifecycle, w4-08): one of
    "acquired", "released", "recycled", "closed". Low cardinality, no
    session/query content — safe in all three contexts.

- name: saena.experiment_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    Identifier of one pre-registered experiment (mirrors
    packages/domain/src/saena_domain/experiment `ExperimentRegistration.experiment_id`,
    w4-09). An opaque id, never the registration's own
    query_cluster_ref/asset_hash content beyond this identifier. Forbidden
    in AggregateContext, same rationale as saena.claim_id — this registry
    entry carries no outcome/lift/causal value (W4/Wave-5-forbidden scope,
    CLAUDE.md "Current decision"); it identifies a REGISTRATION event only.

- name: saena.intent_label
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Closed 9-value query-cluster intent taxonomy (mirrors
    services/intelligence/demand-graph-service `IntentLabel` enum, w4-02:
    "definition|integration|security|pricing|comparison|implementation|migration|support|procurement" —
    a fixed, low-cardinality label, never
    the underlying paraphrase/query text — safe in all three contexts,
    including de-identified aggregate rollups (e.g. "graph builds by
    intent" dashboards).

# ---------------------------------------------------------------------------
# Wave 5 (Measurement / B-layer, w5-17) additions below. Same discipline as
# every entry above: identifiers/hashes/closed-vocabulary enums only — NEVER
# a raw query, URL, evidence excerpt, confirmer identity, or any outcome/
# effect/lift MAGNITUDE value. Measurement is where DiD and B-layer verdicts
# are produced (docs/architecture/wave5-plan.md deliverables 1-5), so the
# temptation to attach an effect size / p-value / lift number as a label is
# highest here — these entries deliberately register ONLY the opaque
# window/bundle identifiers, the bundle content hash, and the closed
# low-cardinality decision/verdict/reason enums. No effect-magnitude
# attribute exists (CLAUDE.md "증거 없는 완료 선언 금지"; wave5-plan.md
# "Unverified external-lift claims" FORBIDDEN). saena.experiment_id (w4-15)
# is REUSED, not re-defined, to correlate a measurement with its
# pre-registered experiment.
# ---------------------------------------------------------------------------

- name: saena.measurement.window_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    Opaque identifier of one 7-day external-performance measurement window
    (started only by a valid `deployment.confirmed.v1`, the sole
    clock-start authority — Algorithm §7.3, w5-03). An opaque id, never the
    confirmer identity, target, or any raw customer content. Forbidden in
    AggregateContext: a per-window identifier is high-cardinality and
    potentially re-identifying, same rationale as saena.experiment_id /
    saena.claim_id.

- name: saena.measurement.verdict
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Closed 3-value outcome-layer B-gate verdict enum (w5-06):
    "pass|fail|undetermined" — EXACTLY three values, never widened without a
    major-version bump (enum narrow AND widen = major, ADR-0012). A fixed
    low-cardinality label used to partition saena.measurement.b_verdicts_total;
    it is a category, NEVER a verdict "strength" / effect magnitude / lift
    value (those are forbidden outright — see measurement.py
    FORBIDDEN_OUTCOME_MAGNITUDE_TOKENS). Safe in all three contexts,
    including de-identified aggregate rollups (e.g. "B-verdicts by outcome"
    dashboards).

- name: saena.measurement.reason_code
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Closed, bounded reason-code enum (w5-06 reason_codes / w5-03
    confirmation-rejection reasons — the typed code-level vocabulary v1,
    wave5-plan.md H7): a fixed low-cardinality machine code such as
    insufficient-layers / contaminated / late-confirmation / single-layer /
    backdate / cross-tenant / replay / identity-unverified. A category code
    ONLY — never a free-text human message, a confirmer identity, or any
    raw customer content (a raw message could carry PII/query text; the code
    cannot). Used to partition saena.measurement.undetermined_reasons_total
    and confirmations_rejected_total. Safe in all three contexts.

  # NOTE (cardinality contract): verdict/reason_code/grs_decision/
  # intake_decision are all CLOSED enums. "low" here is a contract, not a
  # measured observation — widening any of these vocabularies is a
  # major-version registry change (ADR-0012 enum rule), and the reason_code
  # vocabulary in particular must stay bounded (a code enum, never an
  # open free-text field). test_measurement.py pins the closedness.

- name: saena.measurement.grs_decision
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Closed GRS eligibility decision enum (w5-07): fail-closed default
    "deny", plus "allow" / "undetermined" for the evaluated cases. A fixed
    low-cardinality category label used to partition
    saena.measurement.grs_eligibility_evaluated_total — never a threshold
    value, credit amount, or SLA number (those production values are
    BLOCKED(human), wave5-plan.md H1; only the mechanism-level decision
    category is telemetry-safe). Safe in all three contexts.

- name: saena.measurement.intake_decision
  type: string
  cardinality: low
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Closed skill-bank intake decision enum (w5-16): "accepted|rejected" —
    fail-closed boundary that consumes ONLY B-verified outcomes. A fixed
    two-value category label used to partition
    saena.measurement.skill_bank_intake_total; carries no strategy-card
    content or outcome magnitude. Safe in all three contexts.

- name: saena.measurement.evidence_bundle_id
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: forbidden
  description: >
    Opaque identifier of one sealed evidence bundle (w5-08; Algorithm
    §3.7-3 / §11.3). An opaque id, never the bundle's own snapshot /
    citation / raw content — those stay out of telemetry entirely (H10:
    the bundle carries hashes/refs only, no raw content). Forbidden in
    AggregateContext, same high-cardinality re-identification rationale as
    saena.measurement.window_id / saena.experiment_id.

- name: saena.measurement.evidence_bundle_hash
  type: string
  cardinality: high
  pii: false
  contexts:
    tenant: optional
    system: optional
    aggregate: optional
  description: >
    Content-addressed `sha256:<64-hex>` manifest/provenance hash of a
    sealed evidence bundle (w5-08). A HASH of the bundle manifest, NEVER the
    bundle's own raw snapshot/citation content — this entry exists so
    evidence-seal telemetry can correlate a bundle across signals without
    ever carrying its content. Follows the aggregate-safe
    opaque-version-marker precedent of saena.demand_graph_version / saena.contract_hash
    (a content hash identifies a bundle revision, not a tenant or
    individual), so it is optional (not forbidden) in AggregateContext —
    contrast the per-record saena.measurement.evidence_bundle_id, which
    stays forbidden there.
