# Security pipeline (ADR-0018/0019/0020/0021). Owned by Integrator.
# Absorbs pr-guards: spec-immutability, ADR-status, policy-symmetry.
# Dormant-but-armed: sbom/vuln jobs run against committed lockfiles (uv.lock
# exists since W0), arm wider as ecosystems are adopted.
# All actions pinned to full commit SHAs (ADR-0021).

name: security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Resolve diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..HEAD" >> "$GITHUB_OUTPUT"
          fi
      - name: Spec immutability (docs/specs/** frozen — CLAUDE.md)
        run: |
          changed=$(git diff --name-only ${{ steps.range.outputs.range }} -- docs/specs/ || true)
          if [ -n "$changed" ]; then
            echo "docs/specs/** is immutable; propose an ADR instead. Changed:"; echo "$changed"; exit 1
          fi
      - name: ADR Status guard (accepted transition = human-only)
        run: sh tools/validation/guards/check-adr-status.sh ${{ steps.range.outputs.range }}
      - name: Protected-path policy symmetry (Claude/Cursor/CODEOWNERS)
        run: sh tools/validation/check-policy-symmetry.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0 # full-history scan (ADR-0020)
      # Org repos cannot use free gitleaks-action (GITLEAKS_LICENSE required).
      # Pin binary to .tool-versions / ADR-0022 (gitleaks 8.30.0) with checksum verify.
      - name: Install gitleaks 8.30.0 (pinned binary)
        run: |
          set -eu
          ver=8.30.0
          arch=x64
          base="https://github.com/gitleaks/gitleaks/releases/download/v${ver}"
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "${base}/gitleaks_${ver}_linux_${arch}.tar.gz"
          curl -fsSL -o /tmp/gitleaks_checksums.txt \
            "${base}/gitleaks_${ver}_checksums.txt"
          (cd /tmp && grep "gitleaks_${ver}_linux_${arch}.tar.gz" gitleaks_checksums.txt | sha256sum -c -)
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version
      - name: gitleaks detect (full history)
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Generate CycloneDX SBOM (syft — ADR-0021)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cdx.json
          upload-artifact: true

  vuln-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: osv-scanner over committed lockfiles (ADR-0021)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: --lockfile=uv.lock

  actions-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.10.4"
      - name: zizmor (Actions security lint incl. SHA-pin audit)
        run: uvx --from zizmor==1.26.1 zizmor --min-severity medium .github/workflows/
