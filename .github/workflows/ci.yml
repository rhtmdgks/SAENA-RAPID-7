# CI pipeline (ADR-0018). Owned by Integrator; teams hand off job specs via
# tools/validation/ci-jobs/. NOT the Temporal directory — that is /workflows/
# (protected path, unrelated to GitHub Actions).
# All actions pinned to full commit SHAs (ADR-0021); zizmor lints this in security.yml.
# No push/deploy/publish steps exist in this pipeline by policy (CLAUDE.md #10).

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  UV_VERSION: "0.10.4"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - name: Metaschema-validate all JSON Schemas
        run: |
          find packages tests -name '*.schema.json' -print0 \
            | xargs -0 -r uv run check-jsonschema --check-metaschema
      - name: Validate observability registry against its schema
        run: |
          uv run check-jsonschema \
            --schemafile packages/observability/registry/attributes.schema.json \
            packages/observability/registry/attributes.json
      - name: Validate contract registry + OpenAPI composition doc
        run: |
          uv run check-jsonschema --schemafile packages/contracts/registry.schema.json packages/contracts/registry.json
          uv run openapi-spec-validator packages/contracts/openapi/contract-validation/v1/openapi.yaml

  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run lint-imports

  unit:
    needs: [lint, schema-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0 # diff-cover needs origin/main (ADR-0017)
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      # w2-22: byte-identical selector to justfile `test` recipe
      # (`-m "not integration"`) — deterministic unit+contract lane only,
      # no real Temporal/testcontainers process. tests/unit/ci_identity/
      # asserts this stays in lockstep (ADR-0018).
      - run: uv run pytest -q -m "not integration" --cov --cov-report=xml --cov-report=term:skip-covered
      - name: Coverage gates (ADR-0017 — harness>=90, diff>=90, ratchet)
        run: |
          uv run coverage report --include="tests/contract/harness/*" --fail-under=90
          uv run diff-cover coverage.xml --compare-branch origin/main --fail-under=90
          sh tools/validation/coverage-ratchet.sh

  integration:
    # w2-22: the OTHER lane (ADR-0018 two-lane split, w2-20). Depends only on
    # `unit` (not lint/schema-validate directly) — if the deterministic gate
    # is red there is no value paying for real Temporal/testcontainers
    # startup cost; `unit` already re-validates lint+schema-validate as its
    # own upstream gate. This is a REAL required check, not
    # continue-on-error: a container that fails to start must fail the job,
    # not skip silently. The tests' own skipif (Temporal test-server binary
    # unavailable) is the only honest skip path — CI is expected to have
    # network egress for that binary's on-demand download plus Docker
    # (ubuntu-latest GitHub-hosted runners ship Docker preinstalled for
    # testcontainers Postgres/Redpanda), so in CI these tests are expected
    # to RUN, not skip.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-integration

  contract-compat:
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0 # N-1 tag comparison needs history (ADR-0012)
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run pytest tests/contract -q
      - name: contracts-validate (honest when empty — W1 delivers schemas)
        run: uv run just contracts-validate

  contract-lint:
    needs: [schema-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
      - run: npm ci --prefix tools/contract-lint --ignore-scripts
      - name: AsyncAPI CLI smoke (pinned-limitation gate — see tools/contract-lint/README.md)
        run: |
          uv sync --locked
          uv run just contract-lint-smoke

  # ---- Wave 3 named required checks (ADR-0018 stable check names) ----

  evals:
    # W3 eval suite (deterministic 9-axis harness + extraction-architecture
    # test, w3-10). Unit-lane tests — also run inside `unit`; this named job
    # gives the exit-required stable check name with fast, isolated signal.
    needs: [lint, schema-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-evals

  failure-modes:
    # W3 failure-mode 9종 matrix (k3s §10) + rollback verification (w3-09).
    # tests/security is fast (no container); the container-backed rollback
    # proofs run in the `-m integration` subset here.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-failure-modes

  execution-e2e:
    # W3 synthetic-tenant execution E2E (w3-08): real Temporal time-skipping
    # server + Redpanda + Postgres testcontainers (ubuntu-latest ships Docker).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-execution-e2e

  # ---- Wave 4 named required checks (ADR-0018 stable check names; wave4-plan §99) ----

  browser-observer:
    # W4 read-only browser-pool observer unit lane (w4-08): fixture browser,
    # no container, no live ChatGPT.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-browser-observer

  storage-integration:
    # W4 ClickHouse + vector + observation→artifact→ClickHouse→citation pipeline
    # (w4-06/07/13): real testcontainers (ubuntu-latest ships Docker).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-storage-integration

  qeeg-replay:
    # W4 QEEG read-only projection/replay + rebuild/idempotency (w4-11/18).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-qeeg-replay

  experiment-integrity:
    # W4 experiment registration ledger canonical-hash + previous-hash anchor
    # tamper detection (w4-09/18). Registration ONLY — no outcome/DiD/lift.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-experiment-integrity

  intelligence-e2e:
    # W4 composite synthetic intelligence E2E (w4-17): whole chain determinism +
    # tenant isolation + real-ClickHouse round trip.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just test-intelligence-e2e

  # ---- Wave 4 REMEDIATION named required checks (ADR-0018 stable check names) ----

  vector-concurrency:
    # r4-01 pgvector concurrent-upsert integrity — real pgvector testcontainer.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just vector-concurrency

  analytics-idempotency:
    # r4-02 ClickHouse distributed idempotency — real ClickHouse testcontainer,
    # ≥20 concurrent independent writers.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just analytics-idempotency

  experiment-chain-adversarial:
    # r4-03 experiment ledger chain-entry hash commits previous_hash —
    # reorder/relink/splice/deletion adversarial suite.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just experiment-chain-adversarial

  intelligence-privacy:
    # r4-04 query privacy boundary — raw query never persisted; keyed
    # tenant-scoped ref proven against a real ClickHouse testcontainer.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just intelligence-privacy

  # ---- Wave 5 (Measurement·B-Layer) named required checks (ADR-0018) ----
  measurement-clock:
    # w5-03/w5-14: deployment-confirmed validation + trusted 7-day clock +
    # durable Temporal timer (real time-skipping server on ubuntu-latest).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just measurement-clock

  experiment-registration:
    # w5-04: measurement-time experiment binding — immutability + contamination.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just experiment-registration

  did-attribution:
    # w5-05: deterministic per-signal DiD engine.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just did-attribution

  b-layer-gate:
    # w5-06/w5-07: ≥2-independent-layer B-gate + GRS fail-closed policy.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just b-layer-gate

  evidence-bundle:
    # w5-08/w5-09: tamper-evident evidence-bundle manifest + persistence ports.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just evidence-bundle

  measurement-privacy:
    # w5-18/w5-10/w5-11: cross-module privacy/tenant isolation + adversarial +
    # real Postgres/ClickHouse persistence isolation (testcontainers).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just measurement-privacy

  measurement-e2e:
    # w5-19/c5-01: the REAL composed measurement E2E — real Postgres 16 +
    # ClickHouse 24.8 + Temporal time-skipping — plus w5-12/w5-13 boundary +
    # fail-closed pipeline. The `just measurement-e2e` recipe arms
    # SAENA_MEASUREMENT_E2E_REQUIRED=1, so an infra-absent/all-skipped run is a
    # HARD FAILURE (exit 6), never a green "0 passed, N skipped". MUST-FIX C:
    # every pytest line inside the recipe also strips a caller's PYTEST_ADDOPTS
    # (`PYTEST_ADDOPTS=''`) so the hardcoded path set can never be shrunk by
    # this job's (or a reusable-workflow caller's) environment.
    needs: [unit]
    runs-on: ubuntu-latest
    # Runtime EVIDENCE (Wave 5 evidence-integrity closure): the completeness
    # guard writes a saena.gate-evidence/v1 JSON here (even on failure), bound to
    # this commit + run; the render step below turns it into the job summary and
    # FAILS CLOSED if the evidence is missing/stale/incomplete/not-real-container.
    # Set at job level so the gate step AND the render step see the same path.
    env:
      SAENA_GATE_EVIDENCE_PATH: ${{ github.workspace }}/.evidence/gate-e2e.json
      # Gate-UNIQUE invocation id (not just run+attempt) so a same-run evidence
      # file from the OTHER gate invocation cannot be reused here — the strict
      # validator requires evidence.invocation_id == this env value.
      SAENA_GATE_INVOCATION_ID: e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just measurement-e2e
      - name: Render gate evidence (runtime-backed summary, fail-closed)
        # `if: always()` so a FAILED/partial gate still renders the true state.
        # The renderer's OWN exit code gates the job: it exits non-zero (and the
        # summary says NOT PROVEN/FAILED) unless the evidence proves the full
        # required set executed-and-PASSED against real containers on THIS
        # commit+run — a summary can never claim success just by running.
        if: always()
        run: |
          uv run python tools/validation/render_gate_evidence.py \
            --gate e2e \
            --evidence "$SAENA_GATE_EVIDENCE_PATH" \
            --summary-file "$GITHUB_STEP_SUMMARY"
      - name: Upload gate evidence artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-e2e-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/.evidence/gate-e2e.json
          if-no-files-found: warn

  measurement-failure-modes:
    # w5-06/w5-13/w5-18: fail-closed / fraud / UNDETERMINED-never-PASS
    # discriminators (non-test_* helper files named explicitly). MUST-FIX C:
    # every pytest line inside the recipe also strips a caller's PYTEST_ADDOPTS
    # (`PYTEST_ADDOPTS=''`) so the hardcoded path set can never be shrunk by
    # this job's (or a reusable-workflow caller's) environment.
    needs: [unit]
    runs-on: ubuntu-latest
    # Runtime EVIDENCE (Wave 5 evidence-integrity closure) — see measurement-e2e.
    env:
      SAENA_GATE_EVIDENCE_PATH: ${{ github.workspace }}/.evidence/gate-failure-modes.json
      # Gate-UNIQUE invocation id — see measurement-e2e.
      SAENA_GATE_INVOCATION_ID: failure-modes-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just measurement-failure-modes
      - name: Render gate evidence (runtime-backed summary, fail-closed)
        if: always()
        run: |
          uv run python tools/validation/render_gate_evidence.py \
            --gate failure-modes \
            --evidence "$SAENA_GATE_EVIDENCE_PATH" \
            --summary-file "$GITHUB_STEP_SUMMARY"
      - name: Upload gate evidence artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-failure-modes-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/.evidence/gate-failure-modes.json
          if-no-files-found: warn

  # ---- Wave 6 (Skill-Pack · Bootstrap · Pilot) named required checks
  # (ADR-0018 stable check names; W6-27 mission). Each job name == the stable
  # required-check name AND the justfile recipe it runs (`uv run just <name>`).
  # Standard 4-step shape (checkout + setup-uv + uv sync --locked + recipe),
  # actions pinned to the SAME SHAs already used above (ADR-0021). All
  # container-free except pilot-e2e (armed completeness guard, no Docker).

  skill-manifest:
    # w6-01/02: skill-manifest SSOT metaschema + conformance + validator + unit.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just skill-manifest

  skill-quality:
    # w6-02: SKILL.md quality contract + both-direction disk<->manifest cross-check.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just skill-quality

  skill-bundle-bypass:
    # w6-03: fail-closed skill-bundle enforcement (no bypass env/flag) + unit lane.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just skill-bundle-bypass

  plugin-validate:
    # w6-09: plugin/marketplace validation. The drift+structural gate inside the
    # recipe (skill_pack_sync check + skill_pack unit lane) is the ENFORCING
    # layer and needs no external binary; the claude CLI is absent in this image,
    # so the recipe's guard prints an explicit note and does not gate on it (R-2).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just plugin-validate

  claude-bootstrap:
    # w6-10: bootstrap gate. SPLIT (see justfile comments): the DETERMINISTIC,
    # claude-binary-independent `bootstrap-tests` recipe is the BLOCKING step;
    # `bootstrap-claude.sh --check --json` is INFORMATIONAL only (`|| true`),
    # because its claude-cli row legitimately exits nonzero when the claude
    # binary is absent (it is, in this image) — that must not fail the gate.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - name: Bootstrap corpus + unit lane (deterministic blocking layer)
        run: uv run just bootstrap-tests
      - name: Bootstrap self-check (informational — claude binary absent in CI)
        run: sh scripts/bootstrap-claude.sh --check --json || true

  pilot-path-boundary:
    # w6-04/05: pilot path-boundary + read-only discovery unit lanes.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just pilot-path-boundary

  pilot-security:
    # w6-06: pilot security suite — ruff clean + fail-closed / injection-as-data
    # / planted-secret quarantine.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just pilot-security

  pilot-e2e:
    # w6-07/08: composed pilot E2E. The recipe arms SAENA_PILOT_E2E_REQUIRED=1,
    # so a partial selection / zero-collected / all-skipped run is a HARD FAILURE
    # — this required lane can never pass as a shrunk subset or green "0 passed".
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just pilot-e2e

  pilot-failure-modes:
    # w6-08: focused fail-closed family (bundle-fail-closed, dirty-blocks-
    # implement, malicious-quarantined, evidence tamper/truncation, resume-refused).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just pilot-failure-modes

  pilot-evidence-integrity:
    # w6-08: pilot evidence-chain integrity (genesis binds skill-bundle, ordered
    # lifecycle events, tamper/truncation detection).
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just pilot-evidence-integrity

  docs-consistency:
    # w6-16 (docs land in the parallel unit): validates the KEY documented entry
    # points exist and are invocable so no runbook/README command block can
    # reference a dead recipe/script/CLI.
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just docs-consistency

  helm-smoke:
    # W3 offline chart packaging gate (w2-23/w3-07 chart). No cluster contact:
    # helm lint + template + kubeconform static validation + forgectl preflight.
    needs: [lint, schema-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install helm + kubeconform (pinned binaries + checksum verify)
        run: |
          set -eu
          cd /tmp
          # Both projects publish checksum lines that reference the ORIGINAL
          # release filename, so download to that exact name and let
          # `sha256sum -c` match the line directly (no rename mismatch).
          # helm
          hver=3.16.3
          hfile="helm-v${hver}-linux-amd64.tar.gz"
          curl -fsSL -o "$hfile" "https://get.helm.sh/${hfile}"
          curl -fsSL -o "${hfile}.sha256sum" "https://get.helm.sh/${hfile}.sha256sum"
          sha256sum -c "${hfile}.sha256sum"
          tar -xzf "$hfile" -C /tmp
          install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version
          # kubeconform
          kver=0.6.7
          kfile="kubeconform-linux-amd64.tar.gz"
          kbase="https://github.com/yannh/kubeconform/releases/download/v${kver}"
          curl -fsSL -o "$kfile" "${kbase}/${kfile}"
          curl -fsSL -o kubeconform-CHECKSUMS "${kbase}/CHECKSUMS"
          grep " ${kfile}\$" kubeconform-CHECKSUMS | sha256sum -c -
          tar -xzf "$kfile" -C /usr/local/bin kubeconform
          kubeconform -v
      - uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked
      - run: uv run just helm-smoke
